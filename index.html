  <iframe id="profile_iframe"
          src"https://c9c5dc9f-7a0a-4a6b-86be-cf4d681d9754-00-3ilzyfeh60vrr.janeway.replit.dev/"
          width="100%" height="100" style="border:none;border-radius:8px"></iframe>
</div>
 <script>
  const AUTH_SERVER = 'https://c9c5dc9f-7a0a-4a6b-86be-cf4d681d9754-00-3ilzyfeh60vrr.janeway.replit.dev/"
          width="100%" height="100" style="border:none;border-radius:8px'; 
  const IFRAME_ELEM = document.getElementById('profile_iframe');

  window.addEventListener('load', () => {
    const token = localStorage.getItem('accessToken');
    setTimeout(() => {
      if (token && IFRAME_ELEM.contentWindow) {
        IFRAME_ELEM.contentWindow.postMessage(
          { type: 'init', accessToken: token },
          AUTH_SERVER
        );
      }
    }, 500);
  });

  window.addEventListener('message', (event) => {
    if (!event.origin.startsWith(AUTH_SERVER)) return;

    if (event.data?.type === 'logout') {
      localStorage.removeItem('accessToken');
      localStorage.removeItem('refreshToken');
      location.reload();
    }

    if (event.data?.type === 'openProfile') {
      window.open(AUTH_SERVER + '/profile.html', '_blank');
    }
  });
</script>
